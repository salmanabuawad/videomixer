# Live Nginx vhost for mixer.wavelync.com. Mirrors /etc/nginx/sites-enabled/mixer.wavelync.com
# on the server — keep them in sync when you change either side.
#
# Install (Debian/Ubuntu, sites-enabled):
#   sudo cp deploy/nginx-mixer.wavelync.com.conf /etc/nginx/sites-available/mixer.wavelync.com
#   sudo ln -sf /etc/nginx/sites-available/mixer.wavelync.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS is managed by Certbot:
#   sudo certbot --nginx -d mixer.wavelync.com
#
# Shotstack render path needs /uploads/ publicly reachable — the alias below maps
# it to UPLOAD_DIR (./data/uploads relative to /opt/zymtech_innovation).

server {
    server_name mixer.wavelync.com;

    client_max_body_size 512M;
    access_log /var/log/nginx/mixer.wavelync.com.access.log;
    error_log  /var/log/nginx/mixer.wavelync.com.error.log;

    # Uploaded source clips — Shotstack fetches these over HTTPS.
    # Must match PUBLIC_UPLOAD_URL_PREFIX in .env and UPLOAD_DIR in the app.
    location /uploads/ {
        alias /opt/zymtech_innovation/data/uploads/;
        access_log off;
        autoindex  off;
    }

    # Rendered outputs (optional — FastAPI currently serves via /api/jobs/{id}/download).
    location /outputs/ {
        alias /opt/zymtech_innovation/data/renders/;
        access_log off;
        autoindex  off;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://127.0.0.1:8025;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Static SPA (built from frontend/)
    root  /opt/zymtech_innovation/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mixer.wavelync.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mixer.wavelync.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = mixer.wavelync.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name mixer.wavelync.com;
    return 404; # managed by Certbot
}
