# Add this file to your *existing* Nginx — it only defines this hostname and does not replace
# your main nginx.conf or other sites.
#
# Debian/Ubuntu (sites-enabled):
#   sudo cp nginx-mixer.wavelync.com.conf /etc/nginx/sites-available/mixer.wavelync.com
#   sudo ln -sf /etc/nginx/sites-available/mixer.wavelync.com /etc/nginx/sites-enabled/
#
# Or drop-in (some distros / custom layouts):
#   sudo cp nginx-mixer.wavelync.com.conf /etc/nginx/conf.d/mixer.wavelync.com.conf
#
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# TLS: sudo certbot --nginx -d mixer.wavelync.com
# Keep the location / block pointing at 127.0.0.1:8000 after Certbot adds ssl_*.

upstream zymtech_mixer {
    server 127.0.0.1:8025;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name mixer.wavelync.com;

    client_max_body_size 500m;

    location / {
        proxy_pass http://zymtech_mixer;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
